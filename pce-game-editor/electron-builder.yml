appId: jp.co.geroneko.pce.editor.desktop
productName: PCEGameEditor
files:
  - "*.js"
  - renderer/**
  - build/**
extraResources:
  - from: plugins
    to: plugins
    filter:
      - "**/*"
  - from: template
    to: template
    filter:
      - "**/*"
      - "!**/out/**"
extraMetadata:
  main: main.js
mac:
  target:
    - dmg
win:
  target:
    - zip
  artifactName: "${productName}-${version}-${arch}.${ext}"
directories:
  output: dist
