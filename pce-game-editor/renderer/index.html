<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PCE Game Editor</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <svg class="icon-sprite" aria-hidden="true" focusable="false">
    <symbol id="icon-assets" viewBox="0 0 24 24"><rect x="4" y="4" width="6" height="6" rx="1" fill="none" stroke="currentColor" stroke-width="1.8"/><rect x="14" y="4" width="6" height="6" rx="1" fill="none" stroke="currentColor" stroke-width="1.8"/><rect x="4" y="14" width="6" height="6" rx="1" fill="none" stroke="currentColor" stroke-width="1.8"/><rect x="14" y="14" width="6" height="6" rx="1" fill="none" stroke="currentColor" stroke-width="1.8"/></symbol>
    <symbol id="icon-build" viewBox="0 0 24 24"><path d="M14 4l6 6-10 10H4v-6L14 4z" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/><path d="M12 6l6 6" fill="none" stroke="currentColor" stroke-width="1.8"/></symbol>
    <symbol id="icon-code" viewBox="0 0 24 24"><path d="M8 9l-4 3 4 3M16 9l4 3-4 3M13 7l-2 10" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></symbol>
    <symbol id="icon-folder" viewBox="0 0 24 24"><path d="M3 6.5A2.5 2.5 0 0 1 5.5 4H10l2 2h6.5A2.5 2.5 0 0 1 21 8.5v9A2.5 2.5 0 0 1 18.5 20h-13A2.5 2.5 0 0 1 3 17.5z" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/></symbol>
    <symbol id="icon-play" viewBox="0 0 24 24"><path d="M8 6l10 6-10 6z" fill="currentColor"/></symbol>
    <symbol id="icon-puzzle" viewBox="0 0 24 24"><path d="M14 3.5a2 2 0 1 0-4 0H7a1 1 0 0 0-1 1V8a2 2 0 1 0 0 4v4a1 1 0 0 0 1 1h3a2 2 0 1 0 4 0h3a1 1 0 0 0 1-1v-4a2 2 0 1 0 0-4V4.5a1 1 0 0 0-1-1h-3z" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/></symbol>
    <symbol id="icon-save" viewBox="0 0 24 24"><path d="M5 3h12l2 2v16H5z" fill="none" stroke="currentColor" stroke-width="1.8"/><path d="M8 3v6h8V3M8 21v-8h8v8" fill="none" stroke="currentColor" stroke-width="1.8"/></symbol>
    <symbol id="icon-settings" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3" fill="none" stroke="currentColor" stroke-width="1.8"/><path d="M19 12a7 7 0 0 0-.1-1l2-1.5-2-3.5-2.4 1a7 7 0 0 0-1.7-1L14.5 3h-5l-.4 3a7 7 0 0 0-1.7 1L5 6l-2 3.5L5 11a7 7 0 0 0 0 2l-2 1.5L5 18l2.4-1a7 7 0 0 0 1.7 1l.4 3h5l.4-3a7 7 0 0 0 1.7-1l2.4 1 2-3.5-2-1.5c.1-.3.1-.7.1-1z" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/></symbol>
    <symbol id="icon-trash" viewBox="0 0 24 24"><path d="M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></symbol>
  </svg>

  <header class="topbar">
    <div class="topbar-left">
      <div class="app-mark">PCE</div>
      <div>
        <div class="app-name">PCE Game Editor</div>
        <button class="project-chip" id="projectChip" type="button">sample_pce_game</button>
      </div>
    </div>
    <div class="topbar-actions">
      <button class="tool-btn" id="btnSetup" type="button"><svg class="icon"><use href="#icon-settings"></use></svg>Setup</button>
      <button class="tool-btn primary" id="btnBuild" type="button"><svg class="icon"><use href="#icon-build"></use></svg>Build</button>
      <button class="tool-btn accent" id="btnTestPlay" type="button"><svg class="icon"><use href="#icon-play"></use></svg>Test Play</button>
    </div>
  </header>

  <div class="main-layout">
    <nav class="sidebar">
      <div id="pluginTabs" class="plugin-tabs"></div>
      <button class="nav-btn" data-page="setup"><svg class="icon"><use href="#icon-settings"></use></svg><span>Setup</span></button>
      <button class="nav-btn" data-page="plugins"><svg class="icon"><use href="#icon-puzzle"></use></svg><span>Plugins</span></button>
    </nav>

    <main class="editor-area" id="editorArea">
      <section class="editor-page" id="page-setup">
        <div class="setup-layout">
          <div class="pane">
            <div class="pane-header">
              <h2>セットアップ</h2>
              <button class="mini-btn" id="btnRefreshSetup" type="button">更新</button>
            </div>
            <div class="project-form download-form">
              <select id="downloadKind" class="select">
                <option value="cc65">cc65</option>
                <option value="llvmMos">llvm-mos</option>
                <option value="superfamiconv">SuperFamiconv</option>
                <option value="emulatorJs">EmulatorJS</option>
              </select>
              <select id="downloadVersion" class="select"></select>
              <button class="mini-btn" id="btnRefreshVersions" type="button">候補更新</button>
              <button class="mini-btn" id="btnDownloadTool" type="button">DL</button>
            </div>
            <div id="downloadInfo" class="download-info"></div>
            <div id="setupProgress" class="setup-progress" hidden>
              <div class="setup-progress-head">
                <span id="setupProgressLabel">待機中</span>
                <span id="setupProgressMeta"></span>
              </div>
              <div class="progress-track" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
                <div id="setupProgressBar" class="progress-bar"></div>
              </div>
            </div>
            <div id="setupStatus" class="setup-status"></div>
          </div>
          <div class="pane">
            <div class="pane-header"><h2>プロジェクト</h2></div>
            <div class="project-form">
              <input id="newProjectName" class="input" value="sample_pce_game" />
              <button class="mini-btn" id="btnCreateSample" type="button">サンプル作成</button>
              <button class="mini-btn" id="btnOpenProjectFolder" type="button">フォルダ</button>
            </div>
            <div id="projectList" class="project-list"></div>
          </div>
        </div>
      </section>

      <section class="editor-page" id="page-plugins">
        <div class="pane full">
          <div class="pane-header">
            <h2>Plugins</h2>
            <button class="mini-btn" id="btnOpenPlugins" type="button">フォルダ</button>
          </div>
          <div id="pluginList" class="plugin-list"></div>
        </div>
      </section>
    </main>
  </div>

  <footer class="log-panel">
    <div class="log-title">Build / Runtime Log</div>
    <div id="logList" class="log-list"></div>
  </footer>

  <script type="module" src="./renderer.js"></script>
</body>
</html>
