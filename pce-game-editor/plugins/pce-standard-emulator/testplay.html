<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PCE Test Play</title>
  <style>
    html, body { height: 100%; margin: 0; background: #0d1117; color: #e8eef6; font-family: system-ui, sans-serif; }
    #game { width: 100%; height: calc(100% - 44px); }
    header { height: 44px; display: flex; align-items: center; gap: 10px; padding: 0 12px; border-bottom: 1px solid #2c3440; }
    .meta { color: #98a4b3; font-size: 12px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .status { margin-left: auto; color: #78d6ff; font-size: 12px; white-space: nowrap; }
    .error { color: #ff9b9b; padding: 18px; }
  </style>
</head>
<body>
  <header>
    <strong>PCE Test Play</strong>
    <span id="meta" class="meta"></span>
    <span id="status" class="status"></span>
  </header>
  <div id="game"></div>
  <script>
    (async () => {
      const result = await window.pceTestPlay.getContext();
      const ctx = result && result.context;
      const meta = document.getElementById('meta');
      const status = document.getElementById('status');
      const setStatus = (text, isError = false) => {
        status.textContent = text;
        status.style.color = isError ? '#ff9b9b' : '#78d6ff';
      };
      window.addEventListener('error', (event) => setStatus(`Error: ${event.message || 'runtime error'}`, true));
      window.addEventListener('unhandledrejection', (event) => setStatus(`Error: ${event.reason?.message || event.reason || 'runtime error'}`, true));
      if (!ctx || !ctx.romPath || !ctx.emulatorJsDir) {
        document.getElementById('game').innerHTML = '<div class="error">ROM または EmulatorJS が未設定です。</div>';
        return;
      }
      meta.textContent = ctx.romPath;
      setStatus('Ready');
      const installRuntimeGlobalBridge = () => {
        if (window.__pceEjsRuntimeBridgeInstalled) return;
        window.__pceEjsRuntimeBridgeInstalled = true;
        const NativeBlob = window.Blob;
        const nativeAppendChild = Element.prototype.appendChild;
        const nativeNodeAppendChild = Node.prototype.appendChild;
        const decoder = new TextDecoder();
        const looksLikeEjsCore = (part) => {
          try {
            if (typeof part === 'string') return part.includes('EJS_Runtime');
            if (part instanceof Uint8Array) return decoder.decode(part.slice(0, 4096)).includes('EJS_Runtime');
            if (part instanceof ArrayBuffer) return decoder.decode(part.slice(0, 4096)).includes('EJS_Runtime');
            if (ArrayBuffer.isView(part)) return decoder.decode(new Uint8Array(part.buffer, part.byteOffset, Math.min(part.byteLength, 4096))).includes('EJS_Runtime');
          } catch (_) {}
          return false;
        };
        const bridgeRuntimeSource = (source) => source.includes('EJS_Runtime') && !source.includes('__pceEjsRuntimeGlobalBridge')
          ? `${source}\n;try{globalThis.__pceEjsRuntimeGlobalBridge=true;globalThis.EJS_Runtime=EJS_Runtime;}catch(_e){}\n`
          : source;
        function PatchedBlob(parts = [], options = {}) {
          const type = String(options?.type || '').toLowerCase();
          const shouldBridge = type.includes('javascript') && Array.isArray(parts) && parts.some(looksLikeEjsCore);
          const bridgedParts = shouldBridge
            ? parts.concat('\n;try{globalThis.__pceEjsRuntimeGlobalBridge=true;globalThis.EJS_Runtime=EJS_Runtime;}catch(_e){}\n')
            : parts;
          return new NativeBlob(bridgedParts, options);
        }
        PatchedBlob.prototype = NativeBlob.prototype;
        Object.setPrototypeOf(PatchedBlob, NativeBlob);
        Object.defineProperty(window, 'Blob', {
          configurable: true,
          writable: true,
          value: PatchedBlob,
        });
        const appendChildWithEjsRuntimeBridge = function appendChildWithEjsRuntimeBridge(child) {
          if (child && child.tagName === 'SCRIPT' && typeof child.src === 'string' && child.src.startsWith('blob:') && !child.dataset.pceEjsRuntimeBridge) {
            const script = child;
            fetch(script.src)
              .then((response) => response.text())
              .then((source) => {
                const patchedSource = bridgeRuntimeSource(source);
                if (patchedSource !== source) {
                  script.src = URL.createObjectURL(new NativeBlob([patchedSource], { type: 'application/javascript' }));
                }
                script.dataset.pceEjsRuntimeBridge = '1';
                nativeAppendChild.call(this, script);
              })
              .catch(() => nativeAppendChild.call(this, script));
            return child;
          }
          return nativeAppendChild.call(this, child);
        };
        Element.prototype.appendChild = appendChildWithEjsRuntimeBridge;
        Node.prototype.appendChild = function nodeAppendChildWithEjsRuntimeBridge(child) {
          if (child && child.tagName === 'SCRIPT' && typeof child.src === 'string' && child.src.startsWith('blob:') && !child.dataset.pceEjsRuntimeBridge) {
            return appendChildWithEjsRuntimeBridge.call(this, child);
          }
          return nativeNodeAppendChild.call(this, child);
        };
      };
      installRuntimeGlobalBridge();
      window.EJS_player = '#game';
      window.EJS_core = 'pce';
      window.EJS_gameName = 'pce_sample.pce';
      window.EJS_gameID = ctx.gameId || ctx.romPath;
      window.EJS_color = '#23a7ff';
      window.EJS_backgroundColor = '#000000';
      window.EJS_startOnLoaded = true;
      window.EJS_disableDatabases = true;
      window.EJS_disableLocalStorage = true;
      window.EJS_cacheConfig = { enabled: false, cacheMaxSizeMB: 1, cacheMaxAgeMins: 1 };
      window.EJS_ready = () => setStatus('Emulator ready');
      window.EJS_onGameStart = () => setStatus('Running');
      const baseUrl = ctx.emulatorJsUrl || ctx.emulatorJsDir;
      window.EJS_pathtodata = ctx.emulatorJsDataUrl || (baseUrl.endsWith('/data/') ? baseUrl : baseUrl.replace(/\/$/, '') + '/data/');
      window.EJS_gameUrl = ctx.romUrl || ctx.romPath;
      const loader = document.createElement('script');
      loader.src = ctx.emulatorJsLoaderUrl || (baseUrl.endsWith('/loader.js') ? baseUrl : window.EJS_pathtodata.replace(/\/$/, '') + '/loader.js');
      loader.onerror = () => {
        document.getElementById('game').innerHTML = '<div class="error">EmulatorJS loader.js を読み込めませんでした。Setup のパスを確認してください。</div>';
      };
      document.body.appendChild(loader);
    })();
  </script>
</body>
</html>
