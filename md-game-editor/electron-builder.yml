appId: jp.co.geroneko.md.editor.desktop
productName: MegaDriveGameEditor
files:
  - "*.js"
  - renderer/**
  - pkg/**
  - md-emulator.js
  - md-emulator.d.ts
  - build/icon.png
  - build/icon.ico
extraResources:
  - from: bin
    to: bin
    filter:
      - "**/*"
  - from: plugins
    to: plugins
    filter:
      - "**/*"
  - from: projects/sample
    to: projects/sample
    filter:
      - "**/*"
      - "!out/**"
extraFiles:
  - from: build/portable
    to: portable
extraMetadata:
  main: main.js
mac:
  icon: build/icon.icns
  target:
    - dmg
win:
  icon: build/icon.ico
  target:
    - zip
  artifactName: "${productName}-${version}-${arch}.${ext}"
directories:
  output: dist

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  # installerのアイコンも指定したい場合
  installerIcon: ./build/icon.ico