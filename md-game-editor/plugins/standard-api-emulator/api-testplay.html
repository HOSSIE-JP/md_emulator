<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>API テストプレイ</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", sans-serif;
      background: #0a0c10;
      color: #e6edf3;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .topbar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 14px;
      background: #101520;
      border-bottom: 1px solid #1e2535;
      flex-shrink: 0;
    }
    .topbar h1 { margin: 0; font-size: 15px; color: #4aa3ff; }
    .rom-name { font-size: 12px; color: #9ba7b8; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    button {
      padding: 6px 12px;
      border-radius: 7px;
      border: 1px solid #2a2f3a;
      background: #202633;
      color: #e6edf3;
      cursor: pointer;
      font-size: 13px;
    }
    button:hover { border-color: #4aa3ff; }
    button:disabled { opacity: 0.45; cursor: not-allowed; }
    .icon-btn {
      width: 34px;
      height: 34px;
      padding: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex: 0 0 auto;
    }
    .icon-btn svg {
      width: 17px;
      height: 17px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      pointer-events: none;
    }
    .icon-btn.is-danger { color: #ffb4a8; }
    .icon-btn.is-active { color: #8ee6c0; }
    .layout {
      flex: 1;
      min-height: 0;
      display: grid;
      grid-template-columns: minmax(680px, 1fr) minmax(300px, 380px);
      gap: 14px;
      padding: 14px;
    }
    .screen-area {
      min-height: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
      border: 1px solid #1e2535;
      overflow: hidden;
    }
    canvas#screen { width: 640px; height: 448px; image-rendering: pixelated; background: #000; }
    .side {
      min-height: 0;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .panel {
      border: 1px solid #1e2535;
      background: #0f1420;
      padding: 10px;
    }
    .panel h2 { margin: 0 0 8px; font-size: 13px; color: #9fd0ff; }
    .row { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
    .status { font-size: 12px; color: #9ba7b8; line-height: 1.5; }
    .ctrl-pad { display: grid; grid-template-columns: repeat(3, 52px); gap: 4px; width: max-content; }
    .ctrl-pad button { width: 52px; height: 38px; padding: 0; }
    .ctrl-actions { display: flex; gap: 4px; margin-top: 6px; flex-wrap: wrap; }
    .ctrl-actions button { min-width: 52px; height: 36px; }
    pre {
      margin: 0;
      flex: 1;
      min-height: 140px;
      overflow: auto;
      padding: 8px;
      border: 1px solid #26324a;
      background: #080c13;
      color: #b8c4d9;
      font-size: 11px;
      line-height: 1.35;
      white-space: pre-wrap;
    }
    @media (max-width: 980px) {
      .layout { grid-template-columns: 1fr; }
      canvas#screen { width: 100%; height: auto; max-height: 55vh; }
    }
  </style>
</head>
<body>
  <svg width="0" height="0" style="position:absolute;visibility:hidden" aria-hidden="true">
    <symbol id="icon-play" viewBox="0 0 24 24">
      <polygon points="6,4 20,12 6,20" fill="currentColor" stroke="none"></polygon>
    </symbol>
    <symbol id="icon-pause" viewBox="0 0 24 24">
      <rect x="6" y="4" width="4" height="16" fill="currentColor" stroke="none"></rect>
      <rect x="14" y="4" width="4" height="16" fill="currentColor" stroke="none"></rect>
    </symbol>
    <symbol id="icon-reset" viewBox="0 0 24 24">
      <path d="M4 12a8 8 0 1 0 3-6.2"></path>
      <path d="M4 4v5h5"></path>
    </symbol>
    <symbol id="icon-step" viewBox="0 0 24 24">
      <path d="M5 5v14"></path>
      <polygon points="9,5 19,12 9,19" fill="currentColor" stroke="none"></polygon>
    </symbol>
    <symbol id="icon-volume" viewBox="0 0 24 24">
      <path d="M4 14h4l5 4V6l-5 4H4z"></path>
      <path d="M16 9a4 4 0 0 1 0 6"></path>
      <path d="M19 6a8 8 0 0 1 0 12"></path>
    </symbol>
    <symbol id="icon-volume-off" viewBox="0 0 24 24">
      <path d="M4 14h4l5 4V6l-5 4H4z"></path>
      <path d="M18 9l4 4"></path>
      <path d="M22 9l-4 4"></path>
    </symbol>
    <symbol id="icon-info" viewBox="0 0 24 24">
      <circle cx="12" cy="12" r="9"></circle>
      <path d="M12 11v5"></path>
      <path d="M12 8h.01"></path>
    </symbol>
    <symbol id="icon-debug" viewBox="0 0 24 24">
      <rect x="7" y="7" width="10" height="10" rx="2"></rect>
      <path d="M4 10h3"></path>
      <path d="M4 14h3"></path>
      <path d="M17 10h3"></path>
      <path d="M17 14h3"></path>
      <path d="M10 4v3"></path>
      <path d="M14 4v3"></path>
      <path d="M10 17v3"></path>
      <path d="M14 17v3"></path>
    </symbol>
    <symbol id="icon-stop-api" viewBox="0 0 24 24">
      <rect x="6" y="6" width="12" height="12" rx="1"></rect>
      <path d="M4 4l16 16"></path>
    </symbol>
  </svg>
  <div class="topbar">
    <h1>API テストプレイ</h1>
    <span class="rom-name" id="romName">ROM 未指定</span>
    <button id="btnPlay" class="icon-btn" type="button" title="Pause" aria-label="Pause">
      <svg aria-hidden="true"><use href="#icon-pause"></use></svg>
    </button>
    <button id="btnReset" class="icon-btn" type="button" title="Reset" aria-label="Reset">
      <svg aria-hidden="true"><use href="#icon-reset"></use></svg>
    </button>
    <button id="btnStep" class="icon-btn" type="button" title="Step 1 frame" aria-label="Step 1 frame">
      <svg aria-hidden="true"><use href="#icon-step"></use></svg>
    </button>
    <button id="btnAudio" class="icon-btn is-active" type="button" title="Sound On" aria-label="Sound On">
      <svg aria-hidden="true"><use href="#icon-volume"></use></svg>
    </button>
    <button id="btnInfo" class="icon-btn" type="button" title="ROM Info" aria-label="ROM Info">
      <svg aria-hidden="true"><use href="#icon-info"></use></svg>
    </button>
    <button id="btnDebug" class="icon-btn" type="button" title="Debug Viewer" aria-label="Debug Viewer">
      <svg aria-hidden="true"><use href="#icon-debug"></use></svg>
    </button>
    <button id="btnStopApi" class="icon-btn is-danger" type="button" title="Stop API" aria-label="Stop API">
      <svg aria-hidden="true"><use href="#icon-stop-api"></use></svg>
    </button>
  </div>

  <div class="layout">
    <div class="screen-area">
      <canvas id="screen" width="320" height="224"></canvas>
    </div>
    <aside class="side">
      <section class="panel">
        <h2>Status</h2>
        <div class="status" id="status">初期化中...</div>
        <div class="status" id="apiBase"></div>
      </section>
      <section class="panel">
        <h2>Controller</h2>
        <div class="status">Arrow/WASD=方向 U=A J=B K=C Enter=Start</div>
        <div class="ctrl-pad">
          <span></span>
          <button data-btn="up">▲</button>
          <span></span>
          <button data-btn="left">◀</button>
          <span></span>
          <button data-btn="right">▶</button>
          <span></span>
          <button data-btn="down">▼</button>
          <span></span>
        </div>
        <div class="ctrl-actions">
          <button data-btn="a">A</button>
          <button data-btn="b">B</button>
          <button data-btn="c">C</button>
          <button data-btn="start">Start</button>
        </div>
      </section>
      <pre id="out"></pre>
    </aside>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const port = Number(params.get('port')) || 8080;
    const romPath = params.get('romPath') || '';
    const API_BASE = `http://127.0.0.1:${port}`;
    const TARGET_FPS = 60;
    const FRAME_MS = 1000 / TARGET_FPS;
    const DEFAULT_AUDIO_SAMPLE_RATE = 48000;
    const AUDIO_SAMPLES_PER_FRAME = Math.ceil(DEFAULT_AUDIO_SAMPLE_RATE / TARGET_FPS);
    const BTN_MAP = {
      up: 1 << 0,
      down: 1 << 1,
      left: 1 << 2,
      right: 1 << 3,
      b: 1 << 4,
      c: 1 << 5,
      a: 1 << 6,
      start: 1 << 7,
    };

    const canvas = document.getElementById('screen');
    const ctx = canvas.getContext('2d');
    const frameImage = ctx.createImageData(canvas.width, canvas.height);
    const statusEl = document.getElementById('status');
    const outEl = document.getElementById('out');
    const pressed = new Set();
    const touchPressed = new Set();
    let running = true;
    let rafId = 0;
    let lastTs = 0;
    let accumulator = 0;
    let frameInFlight = false;
    let lastButtons = -1;
    let audioEnabled = true;
    let audioCtx = null;
    let audioNextTime = 0;

    document.getElementById('apiBase').textContent = API_BASE;
    document.getElementById('romName').textContent = romPath ? romPath.split(/[\\/]/).pop() : 'ROM 未指定';

    function setStatus(text) {
      statusEl.textContent = text;
    }

    function showJson(data) {
      outEl.textContent = JSON.stringify(data, null, 2);
    }

    function setButtonIcon(button, symbolId) {
      const use = button?.querySelector('use');
      if (use) {
        use.setAttribute('href', `#${symbolId}`);
      }
    }

    async function request(path, method = 'GET', body = null, quiet = false) {
      if (!quiet) setStatus(`${method} ${path}`);
      const response = await fetch(`${API_BASE}${path}`, {
        method,
        headers: body ? { 'Content-Type': 'application/json' } : undefined,
        body: body ? JSON.stringify(body) : undefined,
      });
      const json = await response.json();
      if (!quiet) setStatus(`${method} ${path} -> ${response.status}`);
      return json;
    }

    async function waitForHealth() {
      const startedAt = Date.now();
      while (Date.now() - startedAt < 60000) {
        try {
          const health = await request('/api/v1/health', 'GET', null, true);
          if (health?.ok) return true;
        } catch (_) {}
        setStatus('API サーバー起動待ち...');
        await new Promise((resolve) => setTimeout(resolve, 500));
      }
      throw new Error('API サーバーの起動確認がタイムアウトしました');
    }

    function drawFrame(pixelsArgb) {
      const dst = frameImage.data;
      const len = Math.min(pixelsArgb.length, canvas.width * canvas.height);
      for (let i = 0; i < len; i += 1) {
        const c = pixelsArgb[i] >>> 0;
        const offset = i * 4;
        dst[offset] = (c >> 16) & 0xff;
        dst[offset + 1] = (c >> 8) & 0xff;
        dst[offset + 2] = c & 0xff;
        dst[offset + 3] = (c >> 24) & 0xff;
      }
      ctx.putImageData(frameImage, 0, 0);
    }

    async function refreshFrame() {
      const frame = await request('/api/v1/video/frame', 'GET', null, true);
      if (frame?.pixels_argb) drawFrame(frame.pixels_argb);
    }

    function initAudio() {
      if (audioCtx) return audioCtx;
      const AudioCtor = window.AudioContext || window.webkitAudioContext;
      if (!AudioCtor) {
        setStatus('AudioContext が利用できません');
        audioEnabled = false;
        updateAudioButton();
        return null;
      }
      audioCtx = new AudioCtor({ sampleRate: DEFAULT_AUDIO_SAMPLE_RATE });
      audioNextTime = 0;
      return audioCtx;
    }

    async function resumeAudio() {
      const ctx = initAudio();
      if (ctx && ctx.state === 'suspended') {
        await ctx.resume().catch(() => {});
      }
    }

    function updateAudioButton() {
      const btn = document.getElementById('btnAudio');
      setButtonIcon(btn, audioEnabled ? 'icon-volume' : 'icon-volume-off');
      btn.classList.toggle('is-active', audioEnabled);
      btn.title = audioEnabled ? 'Sound On' : 'Sound Off';
      btn.setAttribute('aria-label', btn.title);
    }

    async function fetchAndPlayAudio() {
      if (!audioEnabled) return;
      const ctx = initAudio();
      if (!ctx || ctx.state !== 'running') return;

      const data = await request(`/api/v1/audio/samples?frames=${AUDIO_SAMPLES_PER_FRAME * 2}`, 'GET', null, true);
      const samples = Array.isArray(data?.samples) ? data.samples : [];
      if (samples.length < 2) return;

      const sampleRate = Number(data.sample_rate || DEFAULT_AUDIO_SAMPLE_RATE);
      const channels = Math.max(1, Number(data.channels || 2));
      const frameCount = Math.floor(samples.length / channels);
      if (frameCount <= 0) return;

      const buffer = ctx.createBuffer(Math.min(2, channels), frameCount, sampleRate);
      for (let ch = 0; ch < buffer.numberOfChannels; ch += 1) {
        const dst = buffer.getChannelData(ch);
        for (let i = 0; i < frameCount; i += 1) {
          dst[i] = Number(samples[(i * channels) + ch] || 0);
        }
      }

      const source = ctx.createBufferSource();
      source.buffer = buffer;
      source.connect(ctx.destination);

      const now = ctx.currentTime;
      if (audioNextTime < now) audioNextTime = now;
      source.start(audioNextTime);
      audioNextTime += buffer.duration;
      if (audioNextTime - now > 0.2) {
        audioNextTime = now + 0.2;
      }
    }

    function computeButtons() {
      let buttons = 0;
      if (pressed.has('ArrowUp') || pressed.has('KeyW') || touchPressed.has('up')) buttons |= BTN_MAP.up;
      if (pressed.has('ArrowDown') || pressed.has('KeyS') || touchPressed.has('down')) buttons |= BTN_MAP.down;
      if (pressed.has('ArrowLeft') || pressed.has('KeyA') || touchPressed.has('left')) buttons |= BTN_MAP.left;
      if (pressed.has('ArrowRight') || pressed.has('KeyD') || touchPressed.has('right')) buttons |= BTN_MAP.right;
      if (pressed.has('KeyJ') || touchPressed.has('b')) buttons |= BTN_MAP.b;
      if (pressed.has('KeyK') || touchPressed.has('c')) buttons |= BTN_MAP.c;
      if (pressed.has('KeyU') || touchPressed.has('a')) buttons |= BTN_MAP.a;
      if (pressed.has('Enter') || touchPressed.has('start')) buttons |= BTN_MAP.start;
      return buttons;
    }

    async function pushControllerState(force = false) {
      const buttons = computeButtons();
      if (!force && buttons === lastButtons) return;
      lastButtons = buttons;
      await request('/api/v1/input/controller', 'POST', { player: 1, buttons }, true);
    }

    async function advanceFrame() {
      if (frameInFlight) return;
      frameInFlight = true;
      try {
        await pushControllerState();
        await request('/api/v1/emulator/step', 'POST', { frames: 1 }, true);
        await refreshFrame();
        await fetchAndPlayAudio();
      } finally {
        frameInFlight = false;
      }
    }

    async function tick(ts) {
      if (!running) return;
      if (!lastTs) lastTs = ts;
      accumulator += ts - lastTs;
      lastTs = ts;
      while (accumulator >= FRAME_MS) {
        accumulator -= FRAME_MS;
        await advanceFrame();
      }
      setStatus('API Test Play 実行中');
      rafId = requestAnimationFrame(tick);
    }

    function startLoop() {
      if (running && !rafId) {
        lastTs = 0;
        rafId = requestAnimationFrame(tick);
      }
    }

    function stopLoop() {
      if (rafId) cancelAnimationFrame(rafId);
      rafId = 0;
      lastTs = 0;
      accumulator = 0;
    }

    async function init() {
      try {
        await waitForHealth();
        if (romPath) {
          setStatus('ROM を API に読み込み中...');
          const result = await request('/api/v1/emulator/load-rom-path', 'POST', { path: romPath });
          showJson(result);
          await refreshFrame();
        }
        running = true;
        startLoop();
      } catch (err) {
        setStatus(`初期化エラー: ${err.message || err}`);
      }
    }

    document.getElementById('btnPlay').addEventListener('click', () => {
      resumeAudio().catch(() => {});
      running = !running;
      const playButton = document.getElementById('btnPlay');
      setButtonIcon(playButton, running ? 'icon-pause' : 'icon-play');
      playButton.title = running ? 'Pause' : 'Play';
      playButton.setAttribute('aria-label', playButton.title);
      if (running) startLoop();
      else stopLoop();
    });

    document.getElementById('btnAudio').addEventListener('click', async () => {
      audioEnabled = !audioEnabled;
      updateAudioButton();
      if (audioEnabled) {
        await resumeAudio();
        audioNextTime = 0;
      }
    });

    document.getElementById('btnReset').addEventListener('click', async () => {
      try {
        const result = await request('/api/v1/emulator/reset', 'POST');
        showJson(result);
        await refreshFrame();
      } catch (err) {
        setStatus(`Reset failed: ${err.message || err}`);
      }
    });

    document.getElementById('btnStep').addEventListener('click', async () => {
      try {
        await advanceFrame();
      } catch (err) {
        setStatus(`Step failed: ${err.message || err}`);
      }
    });

    document.getElementById('btnInfo').addEventListener('click', async () => {
      try {
        showJson(await request('/api/v1/rom/info', 'GET'));
      } catch (err) {
        setStatus(`ROM Info failed: ${err.message || err}`);
      }
    });

    document.getElementById('btnDebug').addEventListener('click', () => {
      const debugUrl = new URL('api-debug.html', window.location.href);
      debugUrl.searchParams.set('port', String(port));
      const debugWindow = window.open(debugUrl.href, 'md-api-debug', 'width=1180,height=820');
      if (debugWindow) {
        debugWindow.focus();
        setStatus('デバッグ画面を開きました');
      } else {
        setStatus('デバッグ画面を開けませんでした');
      }
    });

    document.getElementById('btnStopApi').addEventListener('click', async () => {
      stopLoop();
      running = false;
      await window.apiTestPlay?.stopApiServer?.();
      setStatus('API サーバーを停止しました');
    });

    document.querySelectorAll('[data-btn]').forEach((button) => {
      const name = button.dataset.btn;
      const down = () => { resumeAudio().catch(() => {}); touchPressed.add(name); pushControllerState().catch(() => {}); };
      const up = () => { touchPressed.delete(name); pushControllerState().catch(() => {}); };
      button.addEventListener('mousedown', down);
      button.addEventListener('mouseup', up);
      button.addEventListener('mouseleave', up);
      button.addEventListener('touchstart', (event) => { event.preventDefault(); down(); });
      button.addEventListener('touchend', (event) => { event.preventDefault(); up(); });
      button.addEventListener('touchcancel', (event) => { event.preventDefault(); up(); });
    });

    window.addEventListener('keydown', (event) => {
      if (event.target instanceof Element && ['INPUT', 'TEXTAREA'].includes(event.target.tagName)) return;
      if (event.repeat) return;
      resumeAudio().catch(() => {});
      pressed.add(event.code);
      pushControllerState().catch(() => {});
      event.preventDefault();
    });

    window.addEventListener('keyup', (event) => {
      pressed.delete(event.code);
      pushControllerState().catch(() => {});
      event.preventDefault();
    });

    window.addEventListener('blur', () => {
      pressed.clear();
      pushControllerState(true).catch(() => {});
    });

    window.addEventListener('beforeunload', () => {
      stopLoop();
    });

    window.apiTestPlay?.onApiLog?.((payload) => {
      const text = String(payload?.message || payload?.text || '').trim();
      if (text) outEl.textContent = `${outEl.textContent}\n${text}`.trim().slice(-12000);
    });
    window.apiTestPlay?.onApiExit?.((payload) => {
      stopLoop();
      running = false;
      setStatus(`API サーバー終了 code=${payload?.code ?? 'null'} signal=${payload?.signal ?? 'null'}`);
    });

    updateAudioButton();
    initAudio();
    init();
  </script>
</body>
</html>
