name: Deploy WASM Pages

on:
  push:
    tags:
      - "v*"
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install wasm-pack
        run: cargo install wasm-pack --locked

      - name: Build WASM package
        run: wasm-pack build crates/md-wasm --target web --release --out-dir ../../frontend/pkg

      - name: Inject build version into Service Worker
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          sed -i "s/__BUILD_VERSION__/${SHORT_SHA}/g" frontend/sw.js

      - name: Generate bundled ROM index
        run: |
          python3 -c "
          import glob, json, os
          files = sorted([os.path.basename(p) for p in glob.glob('frontend/roms/*') if os.path.isfile(p) and os.path.basename(p) != 'index.json'])
          open('frontend/roms/index.json', 'w', encoding='utf-8').write(json.dumps({'files': files}, ensure_ascii=False, separators=(',', ':')))
          "

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./frontend

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
