name: Deploy WASM Pages

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install wasm-pack
        run: cargo install wasm-pack --locked

      - name: Install binaryen (wasm-opt)
        run: sudo apt-get update && sudo apt-get install -y binaryen

      - name: Build WASM package
        run: wasm-pack build crates/md-wasm --target web --release --out-dir ../../frontend/pkg

      - name: Optimize wasm binary
        run: wasm-opt -Oz frontend/pkg/md_wasm_bg.wasm -o frontend/pkg/md_wasm_bg.wasm

      - name: Bundle ROM files from repository
        run: |
          mkdir -p frontend/roms
          find roms -maxdepth 1 -type f \( -name '*.bin' -o -name '*.md' -o -name '*.gen' -o -name '*.smd' -o -name '*.sms' -o -name '*.zip' \) -exec cp {} frontend/roms/ \;

      - name: Generate bundled ROM index
        run: |
          mkdir -p frontend/roms
          {
            echo '{"files":['
            first=1
            for f in frontend/roms/*; do
              [ -f "$f" ] || continue
              name=$(basename "$f")
              if [ "$name" = "index.json" ]; then
                continue
              fi
              if [ $first -eq 0 ]; then
                echo ','
              fi
              first=0
              printf '"%s"' "$name"
            done
            echo ']}'
          } | tr -d '\n' > frontend/roms/index.json

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./frontend

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
