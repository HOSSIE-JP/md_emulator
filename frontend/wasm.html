<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Mega Drive Emulator WASM Player</title>
    <style>
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "SF Mono", Consolas, monospace;
        color: #ebf2ff;
        background:
          radial-gradient(circle at top left, rgba(255, 153, 51, 0.18), transparent 28%),
          radial-gradient(circle at bottom right, rgba(0, 190, 170, 0.18), transparent 32%),
          linear-gradient(180deg, #0b1220 0%, #111a2b 100%);
      }
      main {
        max-width: 1200px;
        margin: 0 auto;
        padding: 24px;
      }
      h1 {
        margin: 0 0 8px;
        font-size: 28px;
        letter-spacing: 0.04em;
      }
      p {
        margin: 0;
        color: #b8c4d9;
        line-height: 1.5;
      }
      .toolbar {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        align-items: center;
        margin: 18px 0 16px;
      }
      .toolbar button,
      .toolbar input[type="file"] {
        font: inherit;
      }
      button {
        background: #1f2a44;
        color: #ebf2ff;
        border: 1px solid #334466;
        padding: 8px 14px;
        cursor: pointer;
      }
      button:hover {
        background: #293754;
      }
      button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      .layout {
        display: grid;
        grid-template-columns: 720px minmax(280px, 1fr);
        gap: 18px;
      }
      .screen-card,
      .side-card {
        background: rgba(10, 16, 28, 0.78);
        border: 1px solid #26324a;
        border-radius: 14px;
        padding: 16px;
        box-shadow: 0 16px 40px rgba(0, 0, 0, 0.28);
      }
      canvas {
        width: 100%;
        max-width: 640px;
        aspect-ratio: 320 / 224;
        image-rendering: pixelated;
        border: 1px solid #334466;
        background: #000;
        display: block;
      }
      .meta {
        margin-top: 12px;
        font-size: 12px;
        color: #9fb0cb;
        white-space: pre-wrap;
      }
      .note {
        margin-top: 12px;
        padding: 10px 12px;
        border: 1px solid #334466;
        background: rgba(31, 42, 68, 0.45);
        color: #c7d3e6;
        font-size: 12px;
        line-height: 1.5;
      }
      .status {
        font-size: 12px;
        color: #8fd1c7;
        min-height: 18px;
      }
      .links {
        display: flex;
        gap: 10px;
        margin-top: 14px;
      }
      .links a { color: #8fd1ff; }
      .ctrl-pad {
        display: grid;
        grid-template-columns: repeat(3, 52px);
        gap: 4px;
        margin-top: 10px;
      }
      .ctrl-pad button {
        width: 52px; height: 40px; font-size: 14px; padding: 0; text-align: center;
        background: #1f2a44; color: #ebf2ff; border: 1px solid #334466; cursor: pointer;
      }
      .ctrl-pad button:hover { background: #293754; }
      .ctrl-actions {
        display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px;
      }
      .ctrl-actions button {
        font-size: 13px; min-width: 52px; height: 36px;
        background: #1f2a44; color: #ebf2ff; border: 1px solid #334466; cursor: pointer;
      }
      .ctrl-actions button:hover { background: #293754; }
      @media (max-width: 1080px) {
        .layout { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <main>
      <h1>WASM Direct Player</h1>
      <p>API を介さず、md-wasm をブラウザで直接実行する確認用プレイヤーです。</p>
      <p id="buildVersion" style="font-size:11px;color:#8fd1c7;margin-top:4px">build: loading...</p>
      <div class="toolbar">
        <input id="romFile" type="file" accept=".bin,.md,.gen,.smd,.sms,.zip,application/octet-stream" />
        <input id="stateFile" type="file" accept=".mdstate,.json,application/json,application/octet-stream" />
        <button id="loadRom">Load ROM</button>
        <button id="toggleRun" disabled>Run</button>
        <button id="stepFrame" disabled>Step Frame</button>
        <button id="reset" disabled>Reset</button>
        <button id="toggleAudio" disabled>Unmute</button>
        <button id="saveState" disabled>Save State</button>
        <button id="loadState" disabled>Load State</button>
        <button id="downloadState" disabled>Download State</button>
        <button id="uploadState" disabled>Upload State</button>
      </div>
      <div class="layout">
        <section class="screen-card">
          <canvas id="screen" width="320" height="224"></canvas>
          <div id="status" class="status">initializing wasm...</div>
          <div id="meta" class="meta"></div>
        </section>
        <aside class="side-card">
          <p>操作 (keyboard / buttons)</p>
          <div class="note">
Arrow / WASD: 移動 &nbsp; U: A &nbsp; J: B &nbsp; K: C &nbsp; Enter: Start
          </div>
          <div class="ctrl-pad">
            <span></span>
            <button data-btn="up">&#x25B2;</button>
            <span></span>
            <button data-btn="left">&#x25C0;</button>
            <span></span>
            <button data-btn="right">&#x25B6;</button>
            <span></span>
            <button data-btn="down">&#x25BC;</button>
            <span></span>
          </div>
          <div class="ctrl-actions">
            <button data-btn="a">A</button>
            <button data-btn="b">B</button>
            <button data-btn="c">C</button>
            <button data-btn="start">Start</button>
          </div>
          <div class="links">
            <a href="index.html">REST Frontend</a>
            <a href="debug.html">VDP Debug</a>
          </div>
        </aside>
      </div>
    </main>
    <script type="module">
      import(`./wasm-player.js?v=${Date.now()}`);
    </script>
  </body>
</html>
