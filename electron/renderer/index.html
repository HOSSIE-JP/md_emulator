<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mega Drive Emulator Desktop</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <svg class="icon-sprite" aria-hidden="true" focusable="false">
    <symbol id="icon-folder" viewBox="0 0 24 24"><path d="M3 6.5A2.5 2.5 0 0 1 5.5 4H10l2 2h6.5A2.5 2.5 0 0 1 21 8.5v9A2.5 2.5 0 0 1 18.5 20h-13A2.5 2.5 0 0 1 3 17.5z" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/></symbol>
    <symbol id="icon-play" viewBox="0 0 24 24"><path d="M8 6l10 6-10 6z" fill="currentColor"/></symbol>
    <symbol id="icon-pause" viewBox="0 0 24 24"><path d="M8 6h3v12H8zm5 0h3v12h-3z" fill="currentColor"/></symbol>
    <symbol id="icon-volume" viewBox="0 0 24 24"><path d="M4 14h4l5 4V6l-5 4H4z" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/><path d="M16 9a4 4 0 0 1 0 6" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></symbol>
    <symbol id="icon-mute" viewBox="0 0 24 24"><path d="M4 14h4l5 4V6l-5 4H4z" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/><path d="M16 9l4 6M20 9l-4 6" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></symbol>
    <symbol id="icon-power" viewBox="0 0 24 24"><path d="M12 3v8" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><path d="M7.8 5.8a8 8 0 1 0 8.4 0" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></symbol>
    <symbol id="icon-reset" viewBox="0 0 24 24"><path d="M4 12a8 8 0 1 0 3-6.2" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><path d="M4 4v5h5" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></symbol>
    <symbol id="icon-step" viewBox="0 0 24 24"><path d="M7 6l8 6-8 6zM18 6v12" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></symbol>
    <symbol id="icon-bug" viewBox="0 0 24 24"><path d="M9 8V6a3 3 0 1 1 6 0v2" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><rect x="7" y="8" width="10" height="10" rx="4" fill="none" stroke="currentColor" stroke-width="1.8"/><path d="M4 10h3m10 0h3M4 14h3m10 0h3M8 4L6 2m10 2 2-2M8 20l-2 2m10-2 2 2" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></symbol>
    <symbol id="icon-copy" viewBox="0 0 24 24"><rect x="9" y="9" width="10" height="11" rx="2" fill="none" stroke="currentColor" stroke-width="1.8"/><path d="M6 15H5a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h7a2 2 0 0 1 2 2v1" fill="none" stroke="currentColor" stroke-width="1.8"/></symbol>
    <symbol id="icon-chevron" viewBox="0 0 24 24"><path d="M8 10l4 4 4-4" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></symbol>
  </svg>
  <header class="topbar">
    <div class="title-wrap">
      <h1>Mega Drive Emulator</h1>
      <p class="subtitle">Electron Shell (WASM / REST mode)</p>
    </div>

    <div class="toolbar">
      <div class="mode-tabs" role="tablist" aria-label="Runtime mode">
        <button class="mode-tab active" id="modeTabWasm" data-mode="wasm" role="tab" aria-selected="true">WASM</button>
        <button class="mode-tab" id="modeTabApi" data-mode="api" role="tab" aria-selected="false">API</button>
      </div>

      <label class="scale-picker" for="screenScaleSelect">
        Screen
        <select id="screenScaleSelect">
          <option value="0.5">0.5x</option>
          <option value="1">1.0x</option>
          <option value="2" selected>2.0x</option>
        </select>
      </label>

      <button id="openRomButton" class="icon-button" title="Open ROM" aria-label="Open ROM">
        <svg class="icon"><use href="#icon-folder"></use></svg>
      </button>
      <button id="playPauseButton" class="icon-button" data-mode-only="wasm" title="Play" aria-label="Play">
        <svg class="icon"><use href="#icon-play"></use></svg>
      </button>
      <button id="muteButton" class="icon-button" data-mode-only="wasm" title="Mute" aria-label="Mute">
        <svg class="icon"><use href="#icon-volume"></use></svg>
      </button>

      <button id="apiPowerButton" class="icon-button" data-mode-only="api" title="Start API" aria-label="Start API">
        <svg class="icon"><use href="#icon-power"></use></svg>
      </button>
      <button id="apiStepButton" class="icon-button" data-mode-only="api" title="Step 1 frame" aria-label="Step 1 frame">
        <svg class="icon"><use href="#icon-step"></use></svg>
      </button>

      <button id="resetButton" class="icon-button" title="Reset" aria-label="Reset">
        <svg class="icon"><use href="#icon-reset"></use></svg>
      </button>
      <button id="openDebugButton" class="icon-button" title="Open Debug Window" aria-label="Open Debug Window">
        <svg class="icon"><use href="#icon-bug"></use></svg>
      </button>
    </div>
  </header>

  <main class="content">
    <section class="runtime-area">
      <section class="screen-panel" id="screenPanel" data-mode-panel="wasm">
        <div class="screen-wrap">
          <canvas id="screen" width="320" height="224"></canvas>
        </div>
        <p id="statusLine" class="status">Ready</p>
        <p class="hint">ROM ファイルをこの領域へドロップしてロードできます</p>
      </section>

      <section class="screen-panel hidden" id="apiPanel" data-mode-panel="api">
        <h2>API Runtime</h2>
        <p class="status" id="apiModeStatus">REST API モードです。ROM をロードすると md-api 側で再生を開始します。</p>
        <p class="hint">デバッグは Debug ボタンからサブウィンドウで開けます。</p>
      </section>
    </section>

    <section class="side-panel" id="logSection">
      <div class="panel-header">
        <h2>Runtime Log</h2>
        <div class="panel-actions">
          <button id="copyLogButton" class="icon-button" title="Copy Log" aria-label="Copy Log">
            <svg class="icon"><use href="#icon-copy"></use></svg>
          </button>
          <button id="toggleLogButton" class="icon-button" title="Collapse Log" aria-label="Collapse Log" aria-expanded="true">
            <svg class="icon chevron-icon"><use href="#icon-chevron"></use></svg>
          </button>
        </div>
      </div>
      <pre id="logPanel" class="log-panel"></pre>
    </section>
  </main>

  <script type="module" src="./renderer.js"></script>
</body>
</html>
